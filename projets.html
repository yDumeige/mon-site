<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Site</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 40px 20px;
        }

        header {
           
            padding: 10px 10px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #cbd5e1;
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
        }

        h2 {
            margin-bottom: 10px;
            color: #60a5fa;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
            gap: 20px;
        }

        .project {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .button {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }

        .button:hover {
            background: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
